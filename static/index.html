<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskAgent v2 — Painel do Agente</title>
  <!-- Google Fonts para tipografia premium -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Marked.js para renderização de Markdown (Tabelas, etc) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #0f111a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 18px 28px;
      background: #151926;
      border-bottom: 1px solid #232a3d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      z-index: 10;
    }

    header h1 {
      font-size: 19px;
      font-weight: 700;
      color: #818cf8;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #818cf8;
      border-radius: 50%;
      box-shadow: 0 0 10px #818cf8;
    }

    #btn-limpar {
      background: transparent;
      border: 1px solid #2e384e;
      color: #94a3b8;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    #btn-limpar:hover {
      border-color: #818cf8;
      color: #818cf8;
      background: rgba(129, 140, 248, 0.05);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: radial-gradient(circle at top right, #131725, #0f111a);
    }

    /* Scrollbar premium */
    #chat::-webkit-scrollbar {
      width: 6px;
    }
    #chat::-webkit-scrollbar-track {
      background: transparent;
    }
    #chat::-webkit-scrollbar-thumb {
      background: #232a3d;
      border-radius: 4px;
    }
    #chat::-webkit-scrollbar-thumb:hover {
      background: #2e384e;
    }

    .mensagem-usuario {
      align-self: flex-end;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      padding: 12px 20px;
      border-radius: 18px 18px 4px 18px;
      max-width: 60%;
      font-size: 14.5px;
      line-height: 1.5;
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.2);
      animation: messageSlideIn 0.2s ease-out;
    }

    .mensagem-agente {
      align-self: flex-start;
      max-width: 75%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: messageSlideIn 0.2s ease-out;
    }

    .pensamento {
      background: #151926;
      border: 1px solid #232a3d;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      color: #94a3b8;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    .pensamento span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pensamento span::before {
      content: '⚙️';
      font-size: 10px;
    }

    .resposta {
      background: #1e2538;
      border-radius: 4px 18px 18px 18px;
      padding: 12px 20px;
      font-size: 14.5px;
      line-height: 1.5;
      color: #f1f5f9;
      border: 1px solid rgba(255, 255, 255, 0.02);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      white-space: pre-wrap;
    }

    .resposta table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 12.5px;
      margin-top: 16px;
      margin-bottom: 16px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(99, 102, 241, 0.18);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(99,102,241,0.08);
    }

    /* Header premium com gradiente */
    .resposta thead tr {
      background: linear-gradient(135deg, #1a1f38 0%, #12172b 100%);
    }

    .resposta th {
      color: #6366f1;
      padding: 9px 16px;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 2px solid rgba(99, 102, 241, 0.3);
      white-space: nowrap;
    }

    /* Coluna ID — compacta, monoespaçada, centralizada */
    .resposta th:first-child,
    .resposta td:first-child {
      width: 52px;
      text-align: center;
      font-family: 'Consolas', monospace;
      font-size: 11.5px;
      color: #475569;
      padding-left: 12px;
      padding-right: 12px;
    }
    .resposta th:first-child { color: #4f5e7a; }

    /* Coluna Título */
    .resposta th:nth-child(2),
    .resposta td:nth-child(2) {
      font-weight: 500;
    }

    /* Coluna Status — centralizada */
    .resposta th:last-child,
    .resposta td:last-child {
      text-align: center;
      width: 100px;
    }

    .resposta td {
      padding: 8px 16px;
      border-bottom: 1px solid rgba(35, 42, 61, 0.6);
      color: #94a3b8;
      transition: background 0.15s ease, color 0.15s ease;
      vertical-align: middle;
    }

    /* Zebra striping refinado */
    .resposta tbody tr:nth-child(odd)  td { background: rgba(15, 18, 32, 0.7); }
    .resposta tbody tr:nth-child(even) td { background: rgba(26, 31, 52, 0.6); }

    /* Row hover com borda esquerda accent */
    .resposta tbody tr:hover td {
      background: rgba(99, 102, 241, 0.09) !important;
      color: #e2e8f0;
    }
    .resposta tbody tr:hover td:first-child {
      box-shadow: inset 3px 0 0 #6366f1;
    }

    .resposta tr:last-child td { border-bottom: none; }
    .resposta tr:last-child td:first-child { border-bottom-left-radius: 12px; }
    .resposta tr:last-child td:last-child  { border-bottom-right-radius: 12px; }

    /* Badges com dot indicator */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px 2px 5px;
      border-radius: 20px;
      font-size: 8.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      border: 1px solid transparent;
    }
    .status-badge::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-pending {
      background: rgba(245, 158, 11, 0.08);
      color: #f59e0b;
      border-color: rgba(245, 158, 11, 0.2);
    }
    .status-pending::before { background: #f59e0b; box-shadow: 0 0 4px #f59e0b88; }

    .status-in_progress {
      background: rgba(99, 102, 241, 0.1);
      color: #818cf8;
      border-color: rgba(99, 102, 241, 0.25);
    }
    .status-in_progress::before { background: #818cf8; box-shadow: 0 0 4px #818cf888; }

    .status-done {
      background: rgba(16, 185, 129, 0.08);
      color: #10b981;
      border-color: rgba(16, 185, 129, 0.2);
    }
    .status-done::before { background: #10b981; box-shadow: 0 0 4px #10b98188; }

    #input-area {
      padding: 20px 28px;
      background: #151926;
      border-top: 1px solid #232a3d;
      display: flex;
      gap: 12px;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
      z-index: 10;
    }

    #input {
      flex: 1;
      background: #0f111a;
      border: 1px solid #232a3d;
      color: #f1f5f9;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14.5px;
      outline: none;
      transition: all 0.2s ease;
    }

    #input:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.15);
    }

    #btn-enviar {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14.5px;
      font-weight: 600;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(79, 70, 229, 0.15);
    }

    #btn-enviar:hover {
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      transform: translateY(-1px);
    }
    
    #btn-enviar:active {
      transform: translateY(0);
    }

    #btn-enviar:disabled {
      background: #232a3d;
      color: #64748b;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .loading {
      color: #64748b;
      font-size: 13.5px;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 4px;
      animation: pulse 1.5s infinite;
    }

    .loading::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #818cf8;
      border-radius: 50%;
    }

    @keyframes messageSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>TaskAgent v2</h1>
  <button id="btn-limpar" onclick="limparHistorico()">Limpar conversa</button>
</header>

<div id="chat"></div>

<div id="input-area">
  <input id="input" type="text" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter') enviar()">
  <button id="btn-enviar" onclick="enviar()">Enviar</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const btnEnviar = document.getElementById('btn-enviar');

  function adicionarMensagemUsuario(texto) {
    const div = document.createElement('div');
    div.className = 'mensagem-usuario';
    div.textContent = texto;
    chat.appendChild(div);
    rolarParaBaixo();
  }

  function adicionarRespostaAgente(dados) {
    const container = document.createElement('div');
    container.className = 'mensagem-agente';

    // Pensamento
    const pensamento = document.createElement('div');
    pensamento.className = 'pensamento';
    dados.pensamento.forEach(linha => {
      const span = document.createElement('span');
      span.textContent = linha;
      pensamento.appendChild(span);
    });
    container.appendChild(pensamento);

    // Tasks em tabela
    if (dados.tasks && dados.tasks.length > 0) {
      const tabela = document.createElement('table');
      tabela.className = 'tabela-tasks';
      tabela.innerHTML = `
        <thead>
          <tr><th>ID</th><th>Título</th><th>Status</th></tr>
        </thead>
        <tbody>
          ${dados.tasks.map(t => `
            <tr>
              <td>${t.id}</td>
              <td>${t.title || t.titulo || 'Sem título'}</td>
              <td><span class="status-badge status-${t.status}">${t.status}</span></td>
            </tr>
          `).join('')}
        </tbody>
      `;
      container.appendChild(tabela);
    }

    // Resposta final
    const resposta = document.createElement('div');
    resposta.className = 'resposta';
    
    // Configura o marked para quebrar linhas adequadamente
    marked.setOptions({
      breaks: true
    });
      
    resposta.innerHTML = marked.parse(dados.resposta);

    // Post-processar células da tabela renderizada para injetar as badges de status premium
    const celulas = resposta.querySelectorAll('td');
    celulas.forEach(td => {
      const texto = td.textContent.trim().toLowerCase();
      if (['pending', 'pendente'].includes(texto)) {
        td.innerHTML = `<span class="status-badge status-pending">${td.textContent}</span>`;
      } else if (['in_progress', 'em andamento'].includes(texto)) {
        td.innerHTML = `<span class="status-badge status-in_progress">${td.textContent}</span>`;
      } else if (['done', 'concluído', 'concluida', 'concluída'].includes(texto)) {
        td.innerHTML = `<span class="status-badge status-done">${td.textContent}</span>`;
      }
    });

    container.appendChild(resposta);

    chat.appendChild(container);
    rolarParaBaixo();
  }

  function adicionarLoading() {
    const div = document.createElement('div');
    div.className = 'loading';
    div.id = 'loading';
    div.textContent = 'Agente processando...';
    chat.appendChild(div);
    rolarParaBaixo();
    return div;
  }

  function rolarParaBaixo() {
    chat.scrollTop = chat.scrollHeight;
  }

  async function enviar() {
    const texto = input.value.trim();
    if (!texto) return;

    input.value = '';
    btnEnviar.disabled = true;

    adicionarMensagemUsuario(texto);
    const loading = adicionarLoading();

    try {
      const resposta = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensagem: texto })
      });

      const dados = await resposta.json();
      loading.remove();
      adicionarRespostaAgente(dados);

    } catch (err) {
      loading.remove();
      adicionarRespostaAgente({
        pensamento: [' Erro de conexão'],
        resposta: 'Não consegui conectar ao agente.',
        tasks: null
      });
    }

    btnEnviar.disabled = false;
    input.focus();
  }

  async function limparHistorico() {
    await fetch('/chat/historico', { method: 'DELETE' });
    chat.innerHTML = '';
  }
</script>

</body>
</html>
